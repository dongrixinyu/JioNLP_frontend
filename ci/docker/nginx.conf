worker_processes auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

worker_rlimit_nofile 65535;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout 60;

    # ── Gzip ──────────────────────────────────────────────────────────
    gzip on;
    gzip_min_length 1k;
    gzip_buffers    4 16k;
    gzip_http_version 1.0;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/xml
        image/jpeg image/gif image/png image/svg+xml;
    gzip_vary on;

    # ── Upstream: JioNLP backend ───────────────────────────────────────
    # The backend runs on the Docker host at port 16666.
    # "host-gateway" resolves to the host IP automatically when using
    # --add-host=host.docker.internal:host-gateway in docker run.
    upstream jionlp_backend {
        server host.docker.internal:16666;
    }

    server {
        listen 80;
        server_name _;                          # accept any hostname / IP

        root /usr/share/nginx/html;             # Vue dist output
        index index.html;

        # ── API proxy — blog ────────────────────────────────────────
        location /blog_api/ {
            proxy_pass         http://jionlp_backend/blog_api/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── API proxy — jio ─────────────────────────────────────────
        location /jio_api/ {
            proxy_pass         http://jionlp_backend/jio_api/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── API proxy — blog images ─────────────────────────────────
        location /blog_image/ {
            proxy_pass         http://jionlp_backend/blog_image/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            expires 30d;
        }

        # ── API proxy — trivials ────────────────────────────────────
        location /trivials/ {
            proxy_pass            http://jionlp_backend/trivials/;
            proxy_set_header      Host              $host;
            proxy_set_header      X-Real-IP         $remote_addr;
            proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header      X-Forwarded-Proto $scheme;
            expires 30d;
            client_max_body_size  100m;
        }

        # ── Static assets — long cache ──────────────────────────────
        location ~* \.(js|css)$ {
            expires 15d;
            add_header Cache-Control "public, no-transform";
        }

        location ~* \.(txt)$ {
            add_header Access-Control-Allow-Origin  *;
            add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
            add_header Access-Control-Allow-Headers
                'DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization';
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # ── SPA fallback — all unmatched routes → index.html ───────
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
