worker_processes  1;

error_log  /root/jionlp_online/JioNLP_frontend/nginx/nginx_error.log warn;

# Change pid to allow no super user to run
# pid        /tmp/nginx.pid;
user root;

worker_rlimit_nofile 65535;
events {
    worker_connections  1024;
}

http {
    proxy_temp_path /tmp/proxy_temp;
    client_body_temp_path /tmp/client_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /root/jionlp_online/JioNLP_frontend/nginx/nginx_access.log  main;

    sendfile        on;
    keepalive_timeout  60;
    client_max_body_size 100m;

    server {  #监听端口
        server_name www.jionlp.com;  #域名
        root /root/jionlp_online/JioNLP_frontend/dist;  #站点目录

        # Gzip 压缩配置 - 优化图片加载
        gzip on;
        gzip_min_length 1k;                    # 最小压缩文件大小
        gzip_buffers 4 16k;                     # 压缩缓冲区大小
        gzip_http_version 1.1;                 # 使用 HTTP/1.1 以获得更好的压缩支持
        gzip_comp_level 6;                     # 压缩级别 1-9，6 是性能和压缩率的平衡点（9 会消耗更多 CPU）
        gzip_types 
            text/plain 
            text/css 
            text/xml 
            text/javascript 
            application/javascript 
            application/x-javascript 
            application/json 
            application/xml 
            application/xml+rss 
            image/svg+xml
            image/png                           # PNG 图片压缩
            image/jpeg                          # JPEG 图片压缩
            image/gif                           # GIF 图片压缩
            image/webp                          # WebP 图片压缩（未来兼容）
            image/x-icon;                       # ICO 图标压缩
        gzip_vary on;                          # 根据 Accept-Encoding 头启用 Vary
        gzip_disable "msie6";                  # 禁用 IE6 的 gzip（IE6 不支持）
        gzip_proxied any;                      # 对所有代理请求启用压缩

        index index.html;

        location /blog_api/ {
            # 代理所有以 /blog_api/ 开头的请求到后端服务器
            proxy_pass http://0.0.0.0:16666/blog_api/;

            # 设置一些代理相关的参数
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /jio_api/ {
            # 代理所有以 /blog_api/ 开头的请求到后端服务器
            proxy_pass http://0.0.0.0:16666/jio_api/;

            # 设置一些代理相关的参数
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /blog_image/ {  # \d+/\w+\.(gif|jpg|jpeg|png|bmp|swf|ico)$
            # 代理所有以 /blog_api/ 开头的请求到后端服务器
            proxy_pass http://0.0.0.0:16666/blog_image/;

            # 设置一些代理相关的参数
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /trivials/ {
            proxy_pass http://0.0.0.0:16666/trivials/;

            # 设置一些代理相关的参数
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 100m;
        }
        location / {
            root /root/jionlp_online/JioNLP_frontend/dist;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # 心理评估 xlpc 的 WebSocket 代理 (最终修正版)
        location /xlcp/ws/ {
            # 关键修改：在代理地址末尾添加了一个斜杠 "/"
            # 这会告诉 Nginx 将请求转发到后端的根路径 "/"
            proxy_pass http://127.0.0.1:8765/;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 保持长连接超时
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
        # xlcp 前端：由 Docker 容器提供（容器映射到本机 8081）
        location ^~ /xlcp/ {
            proxy_pass http://127.0.0.1:8081/xlcp/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # OpenAI Realtime Token 代理（Python 服务）
        location /realtime/ {
            proxy_pass http://129.226.147.53:8765/realtime/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # API 请求代理配置
        location /xlcp/api/ {
            # 将 API 请求转发到后端服务器
            proxy_pass http://14.103.237.160:29876/;
            
            # 设置请求头
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 设置超时时间
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # 允许跨域请求
            proxy_set_header Origin "";
        }
        location ~ .*\.(txt)$ {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
            add_header Access-Control-Allow-Headers 'DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization';

            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }
        # 图片文件缓存配置 - 启用长期缓存加速加载
        # location ~ .*\.(gif|jpg|jpeg|png|bmp|swf|ico|webp)$
        location ~ ^(?!(/trivials/|/blog_image/)).*\.(gif|jpg|jpeg|png|bmp|swf|ico|webp)$ {
            expires 30d;                        # 缓存 30 天
            add_header Cache-Control "public, immutable";  # 添加缓存控制头
            access_log off;                     # 关闭访问日志以提升性能
        }
        location ~ .*\.(js|css)?$
        {
        expires 15d;
        # access_log off;
        }

        access_log on;
    
        listen 443 ssl; # managed by Certbot
        ssl_certificate /etc/letsencrypt/live/www.jionlp.com/fullchain.pem; # managed by Certbot
        ssl_certificate_key /etc/letsencrypt/live/www.jionlp.com/privkey.pem; # managed by Certbot
        include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

  
    }

    server {
        if ($host = www.jionlp.com) {
            return 301 https://$host$request_uri;
        } # managed by Certbot

        listen 80;
        server_name www.jionlp.com;
        return 404; # managed by Certbot
    }

    # ==================== psyla.cn 域名配置 ====================
    server {
        server_name psyla.cn www.psyla.cn;

        # 静态部署（非 Docker）：将 build 产物放到此目录（与 root 一致）
        root /var/www/html/dist;
        index index.html;

        # Gzip 压缩配置
        gzip on;
        gzip_min_length 1k;
        gzip_buffers 4 16k;
        gzip_http_version 1.1;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;
        gzip_vary on;

        # WebSocket 代理 - 必须放在前面
        location /ws/ {
            proxy_pass http://127.0.0.1:8765/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # API 代理
        location /api/ {
            proxy_pass http://14.103.237.160:29876/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            proxy_set_header Origin "";
        }

        # OpenAI Realtime Token 代理
        location /realtime/ {
            proxy_pass http://129.226.147.53:8765/realtime/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # 前端 SPA（根路径构建）；带 hash 的静态资源可长期缓存
        location / {
            try_files $uri $uri/ /index.html;
        }
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp|mp3|wav|ogg|m4a)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        listen 443 ssl;
        ssl_certificate /etc/letsencrypt/live/psyla.cn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/psyla.cn/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    }

    # HTTP 重定向到 HTTPS
    server {
        listen 80;
        server_name psyla.cn www.psyla.cn;
        return 301 https://$host$request_uri;
    }
}
